{% extends "base.html" %}

{% block content %}
<div class="form-container">
    <div class="form-header">
        <h2>🦠 Disease Detection</h2>
        <p>Upload a clear photo of the plant leaf for AI-powered diagnosis.</p>
    </div>

    <form data-endpoint="/api/predict-disease" enctype="multipart/form-data">
        <label class="file-upload" id="dropZone" for="fileInput"
            style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 200px; cursor: pointer;">
            <input type="file" name="file" id="fileInput" accept="image/*" required>
            <span id="uploadIcon" style="font-size: 4rem; margin-bottom: 1rem; transition: transform 0.3s;">📷</span>
            <p id="uploadText" style="color: var(--text-muted); text-align: center;">Click or Drag & Drop<br>an image
                here to upload</p>

            <!-- Image Preview -->
            <img id="imagePreview" src="" alt="Preview"
                style="display: none; max-width: 100%; max-height: 250px; border-radius: 12px; margin-top: 1rem; border: 2px solid var(--primary);">
        </label>

        <div style="background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 12px; margin-top: 1.5rem;">
            <p style="font-size: 0.9rem; color: var(--text-muted); margin: 0;">
                <strong style="color: var(--primary);">💡 Tips for best results:</strong><br>
                • Use natural lighting for clearer colors<br>
                • Focus on a single leaf with visible symptoms<br>
                • Avoid blurry or dark images
            </p>
        </div>

        <button type="submit" class="btn" style="width: 100%; margin-top: 1.5rem;">
            <span id="btnText">🔬 Analyze Image</span>
        </button>
    </form>
</div>

<script>
    // Image Preview Logic
    const fileInput = document.getElementById('fileInput');
    const imagePreview = document.getElementById('imagePreview');
    const uploadIcon = document.getElementById('uploadIcon');
    const uploadText = document.getElementById('uploadText');

    fileInput.addEventListener('change', function (e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function (event) {
                imagePreview.src = event.target.result;
                imagePreview.style.display = 'block';
                uploadIcon.style.display = 'none';
                uploadText.innerHTML = '<span style="color: #2ecc71;">✓ Image selected. Click Analyze!</span>';
            };
            reader.readAsDataURL(file);
        }
    });

    // Drag and Drop visual feedback
    const dropZone = document.getElementById('dropZone');
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = '#2ecc71';
        dropZone.style.background = 'rgba(46, 204, 113, 0.1)';
    });
    dropZone.addEventListener('dragleave', () => {
        dropZone.style.borderColor = '';
        dropZone.style.background = '';
    });
    dropZone.addEventListener('drop', (e) => {
        dropZone.style.borderColor = '';
        dropZone.style.background = '';
    });
</script>
{% endblock %}
