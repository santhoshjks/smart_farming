{% extends "base.html" %}

{% block content %}
<div class="form-container">
    <div class="form-header">
        <h2>🦠 Disease Detection</h2>
        <p>Upload a clear photo of the plant leaf for AI-powered diagnosis.</p>
    </div>

    <form data-endpoint="/api/predict-disease" enctype="multipart/form-data">
        <label class="file-upload" id="dropZone" for="fileInput"
            style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 200px; cursor: pointer;">
            <input type="file" name="file" id="fileInput" accept="image/*" required>
            <span id="uploadIcon" style="font-size: 4rem; margin-bottom: 1rem; transition: transform 0.3s;">📷</span>
            <p id="uploadText" style="color: var(--text-muted); text-align: center;">
                <span>Click or Drag & Drop</span><br>
                <span>an image here to upload</span>
            </p>

            <!-- Image Preview -->
            <img id="imagePreview" src="" alt="Preview"
                style="display: none; max-width: 100%; max-height: 250px; border-radius: 12px; margin-top: 1rem; border: 2px solid var(--primary);">
        </label>

        <div style="background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 12px; margin-top: 1.5rem;">
            <p style="font-size: 0.9rem; color: var(--text-muted); margin: 0;">
                <strong style="color: var(--primary);"><span>💡</span> <span>Tips for best results:</span></strong><br>
                <span>• Use natural lighting for clearer colors</span><br>
                <span>• Focus on a single leaf with visible symptoms</span><br>
                <span>• Avoid blurry or dark images</span>
            </p>
        </div>

        <button type="submit" class="btn" style="width: 100%; margin-top: 1.5rem;">
            <span id="btnText">🔬 Analyze Image</span>
        </button>
    </form>
</div>

<script>
    // Language helper
    function _dLang() { return localStorage.getItem('smartfarming_lang') || 'en'; }

    // Image Preview Logic
    const fileInput = document.getElementById('fileInput');
    const imagePreview = document.getElementById('imagePreview');
    const uploadIcon = document.getElementById('uploadIcon');
    const uploadText = document.getElementById('uploadText');

    fileInput.addEventListener('change', function (e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function (event) {
                imagePreview.src = event.target.result;
                imagePreview.style.display = 'block';
                uploadIcon.style.display = 'none';
                const msg = _dLang() === 'ta'
                    ? '✓ படம் தேர்ந்தெடுக்கப்பட்டது. ஆய்வு செய் கிளிக் செய்யவும்!'
                    : '✓ Image selected. Click Analyze!';
                uploadText.innerHTML = `<span style="color: #2ecc71;">${msg}</span>`;
            };
            reader.readAsDataURL(file);
        }
    });

    // Drag and Drop visual feedback
    const dropZone = document.getElementById('dropZone');
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = '#2ecc71';
        dropZone.style.background = 'rgba(46, 204, 113, 0.1)';
    });
    dropZone.addEventListener('dragleave', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = '';
        dropZone.style.background = '';
    });
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = '';
        dropZone.style.background = '';

        if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
            fileInput.files = e.dataTransfer.files;
            const event = new Event('change');
            fileInput.dispatchEvent(event);
        }
    });
</script>
{% endblock %}
