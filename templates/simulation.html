{% extends "base.html" %}

{% block content %}
<div class="form-container" style="max-width: 1100px; width: 100%;">
    <div class="form-header">
        <h2>🌱 Crop Growth Simulator</h2>
        <p>Adjust parameters and watch your crop grow from seed to harvest. Plan your season with confidence.</p>
    </div>

    <div class="sim-layout">
        <!-- Controls Panel -->
        <div class="sim-controls">
            <div class="form-group">
                <label for="simCrop">Select Crop</label>
                <select id="simCrop">
                    <option value="rice">🌾 Rice (120 days)</option>
                    <option value="wheat">🌿 Wheat (150 days)</option>
                    <option value="maize">🌽 Maize (90 days)</option>
                    <option value="cotton">🧶 Cotton (180 days)</option>
                    <option value="sugarcane">🎋 Sugarcane (360 days)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="simSoil">Soil Type</label>
                <select id="simSoil">
                    <option value="loamy">Loamy (Best)</option>
                    <option value="clay">Clay</option>
                    <option value="sandy">Sandy</option>
                    <option value="black">Black</option>
                    <option value="red">Red</option>
                </select>
            </div>

            <div class="form-group">
                <label for="simRain">Rainfall <span id="rainVal" class="slider-val">150 mm</span></label>
                <input type="range" id="simRain" min="20" max="400" value="150" class="sim-slider">
            </div>

            <div class="form-group">
                <label for="simTemp">Temperature <span id="tempVal" class="slider-val">28°C</span></label>
                <input type="range" id="simTemp" min="5" max="50" value="28" class="sim-slider">
            </div>

            <div class="form-group">
                <label for="simIrrigation">Irrigation Level <span id="irrigVal" class="slider-val">Medium</span></label>
                <input type="range" id="simIrrigation" min="0" max="2" value="1" step="1" class="sim-slider">
            </div>

            <button type="button" class="btn" id="runSimBtn" style="width: 100%; margin-top: 0.5rem;">
                ▶ Run Simulation
            </button>
        </div>

        <!-- Visualization Panel -->
        <div class="sim-visual">
            <!-- Plant Growth Canvas -->
            <div class="sim-chart-wrapper" id="simChartWrapper">
                <canvas id="plantCanvas"></canvas>
                <!-- Day counter overlay -->
                <div id="dayCounter" class="day-counter-overlay">
                    <span id="dayLabel">Day</span> <span id="dayNum">0</span> / <span id="dayTotal">0</span>
                </div>
            </div>

            <!-- Growth Stage Display -->
            <div class="sim-stage-bar" id="stageBar">
                <div class="stage-item active" data-stage="0">
                    <span class="stage-dot"></span>
                    <span class="stage-label">Seed</span>
                </div>
                <div class="stage-connector"></div>
                <div class="stage-item" data-stage="1">
                    <span class="stage-dot"></span>
                    <span class="stage-label">Sprout</span>
                </div>
                <div class="stage-connector"></div>
                <div class="stage-item" data-stage="2">
                    <span class="stage-dot"></span>
                    <span class="stage-label">Vegetative</span>
                </div>
                <div class="stage-connector"></div>
                <div class="stage-item" data-stage="3">
                    <span class="stage-dot"></span>
                    <span class="stage-label">Flowering</span>
                </div>
                <div class="stage-connector"></div>
                <div class="stage-item" data-stage="4">
                    <span class="stage-dot"></span>
                    <span class="stage-label">Harvest</span>
                </div>
            </div>

            <!-- Stats Row -->
            <div class="sim-stats" id="simStats">
                <div class="sim-stat-card">
                    <span class="stat-icon">📅</span>
                    <span class="stat-value" id="statDays">--</span>
                    <span class="stat-label">Days</span>
                </div>
                <div class="sim-stat-card">
                    <span class="stat-icon">📈</span>
                    <span class="stat-value" id="statYield">--</span>
                    <span class="stat-label">Est. Yield</span>
                </div>
                <div class="sim-stat-card">
                    <span class="stat-icon">💧</span>
                    <span class="stat-value" id="statWater">--</span>
                    <span class="stat-label">Water Need</span>
                </div>
                <div class="sim-stat-card">
                    <span class="stat-icon">⚠️</span>
                    <span class="stat-value" id="statRisk">--</span>
                    <span class="stat-label">Risk Level</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    (function () {
        let time = 0;

        // Language helper - reads from localStorage set by main.js
        function _lang() { return localStorage.getItem('smartfarming_lang') || 'en'; }
        function _t(en, ta) { return _lang() === 'ta' ? ta : en; }

        const CROPS = {
            rice: { days: 120, optTemp: [22, 32], optRain: [150, 300], baseYield: 4.5, unit: 'tons/ha', color: '#6abf47', name: 'Rice' },
            wheat: { days: 150, optTemp: [12, 25], optRain: [50, 150], baseYield: 3.5, unit: 'tons/ha', color: '#7cb342', name: 'Wheat' },
            maize: { days: 90, optTemp: [20, 30], optRain: [80, 200], baseYield: 5.0, unit: 'tons/ha', color: '#4caf50', name: 'Maize' },
            cotton: { days: 180, optTemp: [25, 35], optRain: [60, 120], baseYield: 1.8, unit: 'tons/ha', color: '#66bb6a', name: 'Cotton' },
            sugarcane: { days: 360, optTemp: [25, 38], optRain: [150, 300], baseYield: 70, unit: 'tons/ha', color: '#43a047', name: 'Sugarcane' }
        };

        const SOIL_FACTOR = { loamy: 1.0, clay: 0.85, sandy: 0.7, black: 0.9, red: 0.75 };
        const SOIL_COLORS = { loamy: '#8B6914', clay: '#a0522d', sandy: '#d2b48c', black: '#3e2723', red: '#b33a1e' };
        function getIrrigLabels() { return _lang() === 'ta' ? ['குறைவு', 'நடுத்தர', 'அதிகம்'] : ['Low', 'Medium', 'High']; }
        const IRRIG_FACTOR = [0.7, 1.0, 1.2];

        // Elements
        const cropSel = document.getElementById('simCrop');
        const soilSel = document.getElementById('simSoil');
        const rainSlider = document.getElementById('simRain');
        const tempSlider = document.getElementById('simTemp');
        const irrigSlider = document.getElementById('simIrrigation');
        const rainVal = document.getElementById('rainVal');
        const tempVal = document.getElementById('tempVal');
        const irrigVal = document.getElementById('irrigVal');
        const runBtn = document.getElementById('runSimBtn');
        const canvas = document.getElementById('plantCanvas');
        const ctx = canvas.getContext('2d');
        const dayCounter = document.getElementById('dayCounter');
        const dayNumEl = document.getElementById('dayNum');
        const dayTotalEl = document.getElementById('dayTotal');

        // Update slider labels
        rainSlider.addEventListener('input', () => rainVal.textContent = rainSlider.value + ' mm');
        tempSlider.addEventListener('input', () => tempVal.textContent = tempSlider.value + '°C');
        irrigSlider.addEventListener('input', () => irrigVal.textContent = getIrrigLabels()[irrigSlider.value]);

        // Resize canvas for crisp rendering
        let cW, cH;
        function resizeCanvas() {
            const wrapper = document.getElementById('simChartWrapper');
            const dpr = window.devicePixelRatio || 1;
            const w = wrapper.clientWidth;
            // Adjust height based on screen size
            const h = window.innerWidth <= 768 ? 320 : 400;

            canvas.style.width = w + 'px';
            canvas.style.height = h + 'px';
            canvas.width = w * dpr;
            canvas.height = h * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            cW = w;
            cH = h;
        }
        resizeCanvas();
        window.addEventListener('resize', () => {
            resizeCanvas();
            // Redraw current state if simulation isn't running
            if (!animId) {
                const crop = cropSel.value;
                const soil = soilSel.value;
                drawScene(0, crop, soil, 1.0);
            }
        });

        // Draw initial empty scene
        drawScene(0, 'rice', 'loamy', 1.0);

        // Compute growth parameters
        function computeGrowth(crop, soil, rain, temp, irrig) {
            const profile = CROPS[crop];
            const totalDays = profile.days;
            const soilF = SOIL_FACTOR[soil];
            const irrigF = IRRIG_FACTOR[irrig];

            let tempF = 1;
            if (temp < profile.optTemp[0]) tempF = Math.max(0.2, 1 - (profile.optTemp[0] - temp) * 0.04);
            if (temp > profile.optTemp[1]) tempF = Math.max(0.2, 1 - (temp - profile.optTemp[1]) * 0.04);

            let rainF = 1;
            if (rain < profile.optRain[0]) rainF = Math.max(0.3, rain / profile.optRain[0]);
            if (rain > profile.optRain[1]) rainF = Math.max(0.4, 1 - (rain - profile.optRain[1]) * 0.002);

            const overallFactor = soilF * irrigF * tempF * rainF;
            const estYield = (profile.baseYield * overallFactor).toFixed(1);

            let risk = _t('Low', 'குறைவு');
            let riskLevel = 0; // 0=low, 1=medium, 2=high
            if (overallFactor < 0.5) { risk = _t('High', 'அதிகம்'); riskLevel = 2; }
            else if (overallFactor < 0.75) { risk = _t('Medium', 'நடுத்தர'); riskLevel = 1; }

            let waterNeed = _t('Moderate', 'மிதமான');
            let waterLevel = 1; // 0=low, 1=moderate, 2=high, 3=critical
            if (rainF < 0.5 && irrig < 2) { waterNeed = _t('Critical', 'ஆபத்தான'); waterLevel = 3; }
            else if (rainF < 0.75) { waterNeed = _t('High', 'அதிகம்'); waterLevel = 2; }
            else if (rainF > 0.9 && irrig >= 1) { waterNeed = _t('Low', 'குறைவு'); waterLevel = 0; }

            return { totalDays, estYield, unit: profile.unit, risk, riskLevel, waterNeed, waterLevel, overallFactor };
        }

        // =============================================
        //   NATURAL PLANT DRAWING ENGINE
        // =============================================

        function drawScene(progress, cropType, soilType, factor) {
            const w = cW, h = cH;
            ctx.clearRect(0, 0, w, h);
            time += 0.02;
            const profile = CROPS[cropType];
            const soilColor = SOIL_COLORS[soilType] || '#8B6914';
            const groundY = h * 0.75;
            const bx = w * 0.5, by = groundY;

            // --- SKY with atmospheric gradient ---
            const sky = ctx.createLinearGradient(0, 0, 0, groundY);
            const dayLight = 0.3 + Math.sin(progress * Math.PI) * 0.7;
            sky.addColorStop(0, lerpColor('#0b1026', '#4a90d9', dayLight));
            sky.addColorStop(0.45, lerpColor('#15253e', '#87ceeb', dayLight));
            sky.addColorStop(1, lerpColor('#1a3030', '#b8dce8', dayLight));
            ctx.fillStyle = sky;
            ctx.fillRect(0, 0, w, groundY + 10);

            // --- Sun ---
            if (progress > 0.05) {
                const sp = Math.sin(progress * Math.PI);
                const sx = w * 0.15 + progress * w * 0.7;
                const sy = groundY * 0.12 + (1 - sp) * groundY * 0.35;
                // Outer glow
                const sg = ctx.createRadialGradient(sx, sy, 0, sx, sy, 50);
                sg.addColorStop(0, `rgba(255,240,80,${0.6 * sp})`);
                sg.addColorStop(0.4, `rgba(255,200,50,${0.2 * sp})`);
                sg.addColorStop(1, 'rgba(255,200,50,0)');
                ctx.fillStyle = sg;
                ctx.beginPath(); ctx.arc(sx, sy, 50, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = `rgba(255,248,180,${0.9 * sp})`;
                ctx.beginPath(); ctx.arc(sx, sy, 14, 0, Math.PI * 2); ctx.fill();
            }

            // --- Soft clouds ---
            const ca = Math.min(0.2, progress * 0.4) * dayLight;
            if (ca > 0.01) {
                _cloud(w * 0.18 + Math.sin(time * 0.3) * 8, groundY * 0.18, 50, ca);
                _cloud(w * 0.58 + Math.sin(time * 0.2 + 1) * 10, groundY * 0.25, 35, ca * 0.7);
                _cloud(w * 0.82 + Math.cos(time * 0.25) * 6, groundY * 0.12, 28, ca * 0.5);
            }

            // --- Birds (far away) ---
            if (progress > 0.3) {
                const ba = Math.min(0.5, (progress - 0.3) * 1.2);
                for (let i = 0; i < 3; i++) {
                    const birdX = (w * 0.3 + i * w * 0.2 + Math.sin(time + i * 2) * 15) % w;
                    const birdY = groundY * 0.15 + i * 12 + Math.sin(time * 2 + i) * 4;
                    _bird(birdX, birdY, 6 + i, ba);
                }
            }

            // --- Rolling hills (background) ---
            const hillColors = ['rgba(34,80,50,0.35)', 'rgba(28,65,42,0.5)', 'rgba(22,55,35,0.6)'];
            for (let layer = 0; layer < 3; layer++) {
                ctx.fillStyle = hillColors[layer];
                ctx.beginPath();
                ctx.moveTo(0, groundY);
                const freq = 0.004 + layer * 0.002;
                const amp = 20 + layer * 15;
                const offset = groundY - 30 + layer * 12;
                for (let x = 0; x <= w; x += 3) {
                    ctx.lineTo(x, offset + Math.sin(x * freq + layer * 1.5) * amp + Math.sin(x * freq * 2.3 + layer) * amp * 0.3);
                }
                ctx.lineTo(w, groundY); ctx.closePath(); ctx.fill();
            }

            // --- Background vegetation (small grass/weeds) ---
            if (progress > 0.08) {
                const veg = Math.min(1, progress * 2.5);
                for (let i = 0; i < 50; i++) {
                    const gx = (i / 50) * w;
                    const ht = (4 + Math.sin(i * 1.3) * 6) * veg;
                    const sway = Math.sin(time * 1.5 + i * 0.7) * 2 * veg;
                    ctx.strokeStyle = `rgba(60,${110 + (i % 40)},50,${0.15 + veg * 0.2})`;
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(gx, groundY);
                    ctx.quadraticCurveTo(gx + sway, groundY - ht * 0.6, gx + sway * 1.2, groundY - ht);
                    ctx.stroke();
                }
            }

            // --- GROUND with organic soil layers ---
            const grd = ctx.createLinearGradient(0, groundY, 0, h);
            grd.addColorStop(0, lighten(soilColor, 1.15));
            grd.addColorStop(0.08, soilColor);
            grd.addColorStop(0.4, darken(soilColor, 0.7));
            grd.addColorStop(1, darken(soilColor, 0.4));
            ctx.fillStyle = grd;
            ctx.beginPath(); ctx.moveTo(0, groundY);
            // wavy ground line
            for (let x = 0; x <= w; x += 4) {
                ctx.lineTo(x, groundY + Math.sin(x * 0.02) * 3 + Math.sin(x * 0.05) * 1.5);
            }
            ctx.lineTo(w, h); ctx.lineTo(0, h); ctx.closePath(); ctx.fill();

            // Soil texture (tiny pebbles/dots)
            for (let i = 0; i < 60; i++) {
                const px = ((i * 137 + 53) % w);
                const py = groundY + 5 + ((i * 73 + 19) % (h - groundY - 10));
                ctx.fillStyle = `rgba(0,0,0,${0.04 + (i % 5) * 0.015})`;
                ctx.beginPath(); ctx.arc(px, py, 0.5 + (i % 3) * 0.4, 0, Math.PI * 2); ctx.fill();
            }

            // --- PLANT ---
            if (progress <= 0.03) {
                // Seed in soil
                ctx.fillStyle = '#6d4c2a';
                ctx.beginPath(); ctx.ellipse(bx, by + 6, 6, 4, -0.15, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,0.12)';
                ctx.beginPath(); ctx.ellipse(bx - 1.5, by + 4.5, 2.5, 1.5, 0, 0, Math.PI * 2); ctx.fill();
                // Tiny crack
                if (progress > 0.015) {
                    ctx.strokeStyle = 'rgba(100,180,60,0.5)';
                    ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.moveTo(bx, by + 3); ctx.lineTo(bx, by); ctx.stroke();
                }
            } else {
                _drawNaturalPlant(bx, by, progress, factor, profile, cropType, w);
            }

            // --- Rain effect ---
            const rain = parseInt(rainSlider.value);
            if (rain > 180 && progress > 0.05 && progress < 0.85) {
                const ri = Math.min(1, (rain - 180) / 220);
                ctx.strokeStyle = `rgba(150,200,255,${ri * 0.25})`;
                ctx.lineWidth = 0.8;
                for (let i = 0; i < Math.floor(ri * 30); i++) {
                    const rx = Math.random() * w, ry = Math.random() * groundY;
                    ctx.beginPath(); ctx.moveTo(rx, ry); ctx.lineTo(rx - 1.5, ry + 10); ctx.stroke();
                }
            }

            // --- HUD ---
            const pct = Math.min(100, Math.round(progress * 100));
            ctx.fillStyle = 'rgba(255,255,255,0.55)';
            ctx.font = '600 12px Inter, sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(`${_t('Growth', 'வளர்ச்சி')}: ${pct}%`, 12, 20);
            ctx.fillStyle = 'rgba(255,255,255,0.08)';
            _roundRect(12, 26, 90, 5, 2.5, true);
            ctx.fillStyle = profile.color;
            _roundRect(12, 26, pct * 0.9, 5, 2.5, true);
        }

        // ---- NATURAL PLANT ----
        function _drawNaturalPlant(bx, by, p, fac, prof, crop, W) {
            const maxH = 150 * fac;
            const stemH = Math.min(maxH, p * maxH * 1.6);
            const topY = by - stemH;
            const wind = Math.sin(time * 1.4) * 3.5 * Math.min(1, p * 2);

            // --- Roots ---
            if (p > 0.06) {
                const rd = Math.min(28, p * 55);
                ctx.lineWidth = 1.2; ctx.lineCap = 'round';
                ctx.strokeStyle = `rgba(110,85,40,${0.25 + p * 0.3})`;
                _bezRoot(bx, by, bx - 10, by + rd, -6);
                _bezRoot(bx, by, bx + 12, by + rd * 0.85, 5);
                if (p > 0.25) { ctx.lineWidth = 0.8; _bezRoot(bx - 5, by + rd * 0.35, bx - 18, by + rd * 0.7, -3); }
            }

            // --- Stem (organic tapered bezier) ---
            const stemW_base = 2.5 + p * 5 * fac;
            const stemW_top = 1 + p * 2;
            const cp1x = bx + wind * 0.3, cp1y = by - stemH * 0.35;
            const cp2x = bx + wind * 0.8, cp2y = by - stemH * 0.7;
            const tipX = bx + wind * 0.5, tipY = topY;

            // Stem fill (tapered quad)
            const segments = 20;
            for (let i = 0; i < segments; i++) {
                const t0 = i / segments, t1 = (i + 1) / segments;
                const p0 = _bezPt(bx, by, cp1x, cp1y, cp2x, cp2y, tipX, tipY, t0);
                const p1 = _bezPt(bx, by, cp1x, cp1y, cp2x, cp2y, tipX, tipY, t1);
                const w0 = stemW_base * (1 - t0 * 0.65);
                const w1 = stemW_base * (1 - t1 * 0.65);
                // color gradient along stem
                const g = Math.floor(80 + t0 * 60);
                const r = Math.floor(40 + t0 * 30);
                ctx.fillStyle = `rgb(${r}, ${g + Math.floor(t0 * 20)}, ${Math.floor(20 + t0 * 15)})`;
                ctx.beginPath();
                ctx.moveTo(p0.x - w0, p0.y); ctx.lineTo(p1.x - w1, p1.y);
                ctx.lineTo(p1.x + w1, p1.y); ctx.lineTo(p0.x + w0, p0.y);
                ctx.closePath(); ctx.fill();
            }
            // Stem highlight
            ctx.strokeStyle = 'rgba(255,255,255,0.07)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, tipX, tipY);
            ctx.stroke();

            // --- Leaves ---
            if (p > 0.1) {
                const lc = Math.min(7, Math.floor(p * 10));
                for (let i = 0; i < lc; i++) {
                    const t = (i + 1) / (lc + 1);
                    const lp = _bezPt(bx, by, cp1x, cp1y, cp2x, cp2y, tipX, tipY, t);
                    const side = i % 2 === 0 ? 1 : -1;
                    const sz = (12 + p * 32) * fac * (0.4 + t * 0.6);
                    const age = Math.max(0, p - t * 0.25);
                    const alpha = Math.min(1, age * 3.5);
                    const leafWind = wind * t * 0.3;
                    _naturalLeaf(lp.x, lp.y, sz, side, alpha, prof.color, p, leafWind);
                }
            }

            // --- Flowers ---
            if (p > 0.5 && p < 0.88) {
                const fp = (p - 0.5) / 0.38;
                _naturalFlower(tipX, tipY, 10 + fp * 14, fp, crop);
                if (fp > 0.35) _naturalFlower(tipX - 22, tipY + 18, 7 + fp * 8, fp - 0.3, crop);
                if (fp > 0.55) _naturalFlower(tipX + 24, tipY + 22, 6 + fp * 7, fp - 0.5, crop);
            }

            // --- Fruit/Grain ---
            if (p > 0.7) {
                const frp = (p - 0.7) / 0.3;
                _naturalFruit(tipX, tipY, frp, prof, crop, fac);
            }

            // --- Dew drops on leaves (morning feel) ---
            if (p > 0.15 && p < 0.5) {
                const da = (0.5 - p) / 0.35;
                for (let i = 0; i < 4; i++) {
                    const t = 0.3 + i * 0.15;
                    const dp = _bezPt(bx, by, cp1x, cp1y, cp2x, cp2y, tipX, tipY, t);
                    const side = i % 2 === 0 ? 8 : -8;
                    ctx.fillStyle = `rgba(180,220,255,${da * 0.5})`;
                    ctx.beginPath(); ctx.arc(dp.x + side, dp.y - 3, 2, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = `rgba(255,255,255,${da * 0.4})`;
                    ctx.beginPath(); ctx.arc(dp.x + side - 0.5, dp.y - 3.5, 0.8, 0, Math.PI * 2); ctx.fill();
                }
            }

            // Soil mound
            ctx.fillStyle = `rgba(70,50,25,0.3)`;
            ctx.beginPath(); ctx.ellipse(bx, by + 2, 18 + p * 8, 5, 0, 0, Math.PI * 2); ctx.fill();
        }

        // --- Natural Leaf ---
        function _naturalLeaf(x, y, size, side, alpha, color, p, windOff) {
            ctx.save(); ctx.globalAlpha = alpha;
            ctx.translate(x, y);
            const angle = side * (0.35 + p * 0.25) + windOff * 0.03;
            ctx.rotate(angle);
            const lw = size * 0.85, lh = size * 0.32;
            // Leaf body
            const lg = ctx.createLinearGradient(0, 0, lw * side, 0);
            lg.addColorStop(0, darken(color, 0.65));
            lg.addColorStop(0.4, color);
            lg.addColorStop(0.8, lighten(color, 1.2));
            lg.addColorStop(1, lighten(color, 1.35));
            ctx.fillStyle = lg;
            ctx.beginPath(); ctx.moveTo(0, 0);
            ctx.bezierCurveTo(lw * 0.25 * side, -lh * 1.1, lw * 0.7 * side, -lh * 0.8, lw * side, -lh * 0.1);
            ctx.bezierCurveTo(lw * 0.7 * side, lh * 0.5, lw * 0.25 * side, lh * 0.7, 0, 0);
            ctx.fill();
            // Central vein
            ctx.strokeStyle = 'rgba(255,255,255,0.12)';
            ctx.lineWidth = 0.6;
            ctx.beginPath(); ctx.moveTo(0, 0);
            ctx.quadraticCurveTo(lw * 0.5 * side, -lh * 0.15, lw * 0.85 * side, -lh * 0.05);
            ctx.stroke();
            // Sub-veins
            if (p > 0.25) {
                ctx.strokeStyle = 'rgba(255,255,255,0.06)';
                ctx.lineWidth = 0.4;
                for (let v = 1; v <= 4; v++) {
                    const vt = v / 5;
                    const vx = lw * vt * side, vy = -lh * 0.15 * vt;
                    ctx.beginPath(); ctx.moveTo(vx, vy);
                    ctx.lineTo(vx + 4 * side, vy - 5); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(vx, vy);
                    ctx.lineTo(vx + 3 * side, vy + 4); ctx.stroke();
                }
            }
            ctx.globalAlpha = 1; ctx.restore();
        }

        // --- Natural Flower ---
        function _naturalFlower(x, y, size, fp, crop) {
            ctx.globalAlpha = Math.min(1, fp * 2.5);
            const pc = crop === 'rice' ? 6 : 5;
            const colors = { rice: ['#e8f5e9', '#c8e6c9'], wheat: ['#fff8e1', '#ffecb3'], maize: ['#fff9c4', '#fff176'], cotton: ['#fce4ec', '#f8bbd0'], sugarcane: ['#f3e5f5', '#ce93d8'] };
            const [c1, c2] = colors[crop] || ['#fff9c4', '#fff59d'];
            for (let i = 0; i < pc; i++) {
                const a = (i / pc) * Math.PI * 2 - Math.PI / 2 + Math.sin(time + i) * 0.05;
                const px = x + Math.cos(a) * size * 0.55, py = y + Math.sin(a) * size * 0.55;
                const pg = ctx.createRadialGradient(px, py, 0, px, py, size * 0.3);
                pg.addColorStop(0, c1); pg.addColorStop(1, c2);
                ctx.fillStyle = pg;
                ctx.beginPath(); ctx.ellipse(px, py, size * 0.3, size * 0.16, a, 0, Math.PI * 2); ctx.fill();
            }
            // Center
            const cg = ctx.createRadialGradient(x, y, 0, x, y, size * 0.18);
            cg.addColorStop(0, '#ffca28'); cg.addColorStop(1, '#f57f17');
            ctx.fillStyle = cg;
            ctx.beginPath(); ctx.arc(x, y, size * 0.18, 0, Math.PI * 2); ctx.fill();
            ctx.globalAlpha = 1;
        }

        // --- Natural Fruit ---
        function _naturalFruit(x, y, fp, prof, crop, fac) {
            ctx.globalAlpha = Math.min(1, fp * 1.8);
            const sz = (10 + fp * 18) * fac;
            if (crop === 'rice') {
                // Drooping panicle with natural grains
                const gc = Math.floor(fp * 14);
                for (let g = 0; g < gc; g++) {
                    const ga = -0.4 + (g / gc) * 0.8;
                    const gx = x + Math.sin(ga) * (8 + g * 1.5) + Math.sin(time + g) * 0.5;
                    const gy = y + g * 3.2 + Math.abs(ga) * 6;
                    const gg = ctx.createRadialGradient(gx, gy, 0, gx, gy, 3.5);
                    gg.addColorStop(0, '#f5e6a3'); gg.addColorStop(1, '#c9a83a');
                    ctx.fillStyle = gg;
                    ctx.beginPath(); ctx.ellipse(gx, gy, 2.2, 4, ga * 0.4, 0, Math.PI * 2); ctx.fill();
                }
            } else if (crop === 'wheat') {
                // Wheat ear with husks
                for (let g = 0; g < 9; g++) {
                    const gy = y - g * 4.5, side = g % 2 === 0 ? 1 : -1;
                    const hg = ctx.createRadialGradient(x + side * 5, gy, 0, x + side * 5, gy, 5);
                    hg.addColorStop(0, fp > 0.5 ? '#daa520' : '#c9b458'); hg.addColorStop(1, '#8b6914');
                    ctx.fillStyle = hg;
                    ctx.beginPath(); ctx.ellipse(x + side * 5, gy, 4.5, 2.8, side * 0.35, 0, Math.PI * 2); ctx.fill();
                    // Awn
                    ctx.strokeStyle = `rgba(184,134,11,${0.5 + fp * 0.3})`;
                    ctx.lineWidth = 0.5;
                    ctx.beginPath(); ctx.moveTo(x + side * 8, gy); ctx.lineTo(x + side * (14 + fp * 6), gy - 6); ctx.stroke();
                }
            } else if (crop === 'maize') {
                // 3D corn cob
                const cg = ctx.createLinearGradient(x - 6, y - sz, x + 6, y);
                cg.addColorStop(0, '#ffe082'); cg.addColorStop(0.5, '#ffd54f'); cg.addColorStop(1, '#ffb300');
                ctx.fillStyle = cg;
                _roundRect(x - 6, y - sz, 12, sz, 5, true);
                // Husk leaves
                ctx.fillStyle = 'rgba(104,159,56,0.55)';
                ctx.beginPath(); ctx.moveTo(x - 8, y); ctx.quadraticCurveTo(x - 14, y - sz * 0.4, x - 7, y - sz - 4); ctx.lineTo(x - 5, y - sz); ctx.closePath(); ctx.fill();
                ctx.beginPath(); ctx.moveTo(x + 8, y); ctx.quadraticCurveTo(x + 14, y - sz * 0.4, x + 7, y - sz - 4); ctx.lineTo(x + 5, y - sz); ctx.closePath(); ctx.fill();
                // Kernel rows
                for (let r = 0; r < 5; r++) for (let c = 0; c < 3; c++) {
                    ctx.fillStyle = `rgba(255,${183 + c * 10},${77 + r * 8},0.7)`;
                    ctx.beginPath(); ctx.arc(x - 3 + c * 3, y - 5 - r * (sz * 0.17), 1.6, 0, Math.PI * 2); ctx.fill();
                }
                // Silk
                if (fp > 0.3) {
                    ctx.strokeStyle = 'rgba(161,136,127,0.6)'; ctx.lineWidth = 0.5;
                    for (let s = 0; s < 5; s++) {
                        ctx.beginPath(); ctx.moveTo(x, y - sz);
                        ctx.quadraticCurveTo(x + (s - 2) * 5, y - sz - 10, x + (s - 2) * 7, y - sz - 16 - s); ctx.stroke();
                    }
                }
            } else if (crop === 'cotton') {
                // Fluffy cotton bolls with 3D shading
                const bs = sz * 0.45;
                for (let b = 0; b < 5; b++) {
                    const ba = (b / 5) * Math.PI * 2 + 0.3;
                    const cbx = x + Math.cos(ba) * bs * 0.5, cby = y + Math.sin(ba) * bs * 0.5;
                    const bg = ctx.createRadialGradient(cbx - 1, cby - 1, 0, cbx, cby, bs * 0.4);
                    bg.addColorStop(0, '#ffffff'); bg.addColorStop(0.6, '#f5f5f5'); bg.addColorStop(1, '#e0e0e0');
                    ctx.fillStyle = bg;
                    ctx.beginPath(); ctx.arc(cbx, cby, bs * 0.35, 0, Math.PI * 2); ctx.fill();
                }
                // Shell
                ctx.fillStyle = '#5d4037';
                for (let s = 0; s < 5; s++) {
                    const sa = (s / 5) * Math.PI * 2;
                    ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + Math.cos(sa) * bs * 0.65, y + Math.sin(sa) * bs * 0.65 - 2);
                    ctx.lineTo(x + Math.cos(sa + 0.2) * bs * 0.4, y + Math.sin(sa + 0.2) * bs * 0.4); ctx.fill();
                }
            } else if (crop === 'sugarcane') {
                // Segmented cane with nodes
                const sc = Math.floor(3 + fp * 5);
                for (let s = 0; s < sc; s++) {
                    const sy = y + 8 - s * 16;
                    const sg = ctx.createLinearGradient(x - 5, sy, x + 5, sy + 14);
                    sg.addColorStop(0, s % 2 === 0 ? '#7cb342' : '#689f38');
                    sg.addColorStop(1, s % 2 === 0 ? '#558b2f' : '#33691e');
                    ctx.fillStyle = sg;
                    _roundRect(x - 5, sy, 10, 14, 3, true);
                    ctx.fillStyle = 'rgba(255,255,255,0.12)';
                    ctx.fillRect(x - 5, sy + 12, 10, 2);
                }
            }
            ctx.globalAlpha = 1;
        }

        // --- Helpers ---
        function _bezPt(x0, y0, c1x, c1y, c2x, c2y, x3, y3, t) {
            const u = 1 - t;
            return {
                x: u * u * u * x0 + 3 * u * u * t * c1x + 3 * u * t * t * c2x + t * t * t * x3,
                y: u * u * u * y0 + 3 * u * u * t * c1y + 3 * u * t * t * c2y + t * t * t * y3
            };
        }
        function _bezRoot(x0, y0, x1, y1, cx) {
            ctx.beginPath(); ctx.moveTo(x0, y0);
            ctx.quadraticCurveTo(x0 + cx, (y0 + y1) * 0.5, x1, y1); ctx.stroke();
        }
        function _cloud(x, y, s, a) {
            ctx.fillStyle = `rgba(255,255,255,${a})`;
            ctx.beginPath();
            ctx.arc(x, y, s * 0.45, 0, Math.PI * 2);
            ctx.arc(x + s * 0.35, y - s * 0.12, s * 0.32, 0, Math.PI * 2);
            ctx.arc(x - s * 0.3, y - s * 0.08, s * 0.28, 0, Math.PI * 2);
            ctx.arc(x + s * 0.15, y + s * 0.1, s * 0.22, 0, Math.PI * 2);
            ctx.fill();
        }
        function _bird(x, y, s, a) {
            ctx.strokeStyle = `rgba(30,30,30,${a})`;
            ctx.lineWidth = 1;
            const wing = Math.sin(time * 4) * s * 0.3;
            ctx.beginPath(); ctx.moveTo(x - s, y + wing); ctx.quadraticCurveTo(x - s * 0.3, y - s * 0.3, x, y); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x, y); ctx.quadraticCurveTo(x + s * 0.3, y - s * 0.3, x + s, y + wing); ctx.stroke();
        }
        function _roundRect(x, y, w, h, r, fill) {
            ctx.beginPath();
            ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y); ctx.closePath();
            if (fill) ctx.fill();
        }
        function darken(hex, f) {
            const [r, g, b] = _hex(hex);
            return `rgb(${Math.floor(r * f)},${Math.floor(g * f)},${Math.floor(b * f)})`;
        }
        function lighten(hex, f) {
            const [r, g, b] = _hex(hex);
            return `rgb(${Math.min(255, Math.floor(r * f))},${Math.min(255, Math.floor(g * f))},${Math.min(255, Math.floor(b * f))})`;
        }
        function _hex(h) {
            return [parseInt(h.slice(1, 3), 16), parseInt(h.slice(3, 5), 16), parseInt(h.slice(5, 7), 16)];
        }
        function lerpColor(a, b, t) {
            const [ar, ag, ab] = _hex(a), [br, bg, bb] = _hex(b);
            return `rgb(${Math.floor(ar + (br - ar) * t)},${Math.floor(ag + (bg - ag) * t)},${Math.floor(ab + (bb - ab) * t)})`;
        }

        // =============================================
        //   ANIMATION ENGINE
        // =============================================
        let animId = null;

        function animateGrowth(result, cropType, soilType) {
            const totalDays = result.totalDays;
            let currentDay = 0;
            const speed = Math.max(0.5, totalDays / 600);
            const frameDelay = 50; // ms between ticks (~20 fps for growth)
            let lastTickTime = 0;
            dayCounter.style.display = 'block';
            document.getElementById('dayLabel').textContent = _t('Day', 'நாள்');
            dayTotalEl.textContent = totalDays;
            if (animId) cancelAnimationFrame(animId);

            function tick(timestamp) {
                if (!lastTickTime) lastTickTime = timestamp;
                const elapsed = timestamp - lastTickTime;
                // Only advance growth every frameDelay ms
                if (elapsed >= frameDelay) {
                    lastTickTime = timestamp;
                    currentDay = Math.min(currentDay + speed, totalDays);
                    dayNumEl.textContent = Math.floor(currentDay);
                }
                const progress = currentDay / totalDays;
                drawScene(progress, cropType, soilType, result.overallFactor);
                updateStages(progress);
                if (currentDay < totalDays) { animId = requestAnimationFrame(tick); }
            }
            animId = requestAnimationFrame(tick);
        }

        function updateStages(progress) {
            const th = [0, 0.1, 0.3, 0.6, 0.9];
            document.querySelectorAll('.stage-item').forEach((item, i) => {
                item.classList.toggle('active', progress >= th[i]);
            });
            document.querySelectorAll('.stage-connector').forEach((conn, i) => {
                conn.classList.toggle('active', progress >= th[i + 1]);
            });
        }

        // Run simulation
        runBtn.addEventListener('click', () => {
            const crop = cropSel.value, soil = soilSel.value;
            const rain = parseInt(rainSlider.value), temp = parseInt(tempSlider.value), irrig = parseInt(irrigSlider.value);
            runBtn.disabled = true;
            runBtn.textContent = _t('⏳ Simulating...', '⏳ உருவகப்படுத்துகிறது...');
            const result = computeGrowth(crop, soil, rain, temp, irrig);
            document.getElementById('statDays').textContent = result.totalDays;
            document.getElementById('statYield').textContent = result.estYield + ' ' + result.unit;
            document.getElementById('statWater').textContent = result.waterNeed;
            document.getElementById('statRisk').textContent = result.risk;
            const riskEl = document.getElementById('statRisk');
            riskEl.style.color = result.riskLevel === 0 ? '#2ecc71' : result.riskLevel === 1 ? '#f1c40f' : '#e74c3c';
            const waterEl = document.getElementById('statWater');
            waterEl.style.color = result.waterLevel === 0 ? '#2ecc71' : result.waterLevel === 1 ? '#3498db' : result.waterLevel === 2 ? '#f1c40f' : '#e74c3c';
            animateGrowth(result, crop, soil);
            const animDuration = Math.ceil((result.totalDays / Math.max(0.5, result.totalDays / 600)) * 50) + 1000;
            setTimeout(() => { runBtn.disabled = false; runBtn.textContent = _t('▶ Run Simulation', '▶ உருவகப்படுத்தலை இயக்கு'); }, animDuration);
        });
    })();
</script>
